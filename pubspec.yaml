name: businesscardapp
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  dio: ^5.9.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  get: ^4.7.3
  http: ^1.6.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^5.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.jpeg"
  min_sdk_android: 21
 